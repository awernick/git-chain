plugins:
  - rubocop-performance
  - rubocop-minitest
  - rubocop-rake

inherit_gem:
  rubocop-shopify: rubocop.yml

AllCops:
  Exclude:
    - 'vendor/**/*'
  TargetRubyVersion: 2.6

# Upstream patterns we preserve
Style/ClassMethodsDefinitions:
  Enabled: false

Style/IdenticalConditionalBranches:
  Enabled: false
